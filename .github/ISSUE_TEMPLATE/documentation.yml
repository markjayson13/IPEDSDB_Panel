name: Documentation
description: Report unclear, stale, or missing repository documentation.
title: "[docs] "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: suggested_text
    attributes:
      label: Suggested text
    validations:
      required: false
